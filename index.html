<!DOCTYPE html>
<html>
<head>
    <title>Free Rewards Only For You!</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #red;
            color: #fff;
            text-align: center;
        }
        #container {
            margin-top: 20vh;
            padding: 50px;
            background-color: #444;
            border-radius: 10px;
        }
        h1 {
            color: #fff;
        }
        #login {
            margin-bottom: 20px;
        }
        #reward {
            display: none;
        }
        button {
            padding: 10px 20px;
            border: none;
            background-color: #green;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Free Rewards Only For You!</h1>
        <div id="login">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Log In</button>
        </div>
        <div id="reward">
            <p>Claim your free reward!</p>
            <button onclick="grabReward()">Get my Reward</button>
        </div>
        <p id="reward-message"></p>
    </div>
</body>
<script>
    const credentials = {
        owner: {
            username: 'Laxbby992',
            password: 'tofikwarebeatsniggas'
        }
    };

    function login() {
        const enteredUsername = document.getElementById('username').value;
        const enteredPassword = document.getElementById('password').value;

        if (enteredUsername === credentials.owner.username && enteredPassword === credentials.owner.password) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('reward').style.display = 'block';
        } else {
            document.getElementById('reward-message').textContent = 'Invalid credentials, you fucking moron!';
        }
    }

    function grabReward() {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', 'https://api.ipify.org?format=json', true);
        xhr.onload = function () {
            if (xhr.status === 200) {
                const response = JSON.parse(xhr.responseText);
                document.getElementById('reward-message').textContent = `Your reward is: Your IP address is ${response.ip}`;
            } else {
                document.getElementById('reward-message').textContent = 'Error grabbing your reward. Try again, dumbass!';
            }
        };
        xhr.send();
    }
</script>
</html>
