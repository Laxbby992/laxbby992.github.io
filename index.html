<!DOCTYPE html>
<html>
<head>
    <title>Discord ID to IP</title>
</head>
<body>
    <h1>Discord ID to IP</hizer>
    <input type="text" id="discord_id" placeholder="Enter Discord User ID">
    <button onclick="lookupIP()">Lookup IP</button>
    <p id="ip_address"></p>

    <script>
        function lookupIP() {
            var discordId = document.getElementById("discord_id").value;
            if (discordId.length === 0) {
                alert("Wprowadź identyfikator użytkownika Discord!");
                return;
            }

            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://discordapp.com/api/users/" + discordId + "/connections", true);
            xhr.setRequestHeader("Authorization", "Token your_bot_token_here");

            xhr.onload = function () {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    for (var i = 0; i < data.length; i++) {
                        if (data[i].type === 1) {
                            var ipAddress = data[i].friend_sync_id.split(":")[0];
                            document.getElementById("ip_address").textContent = "Adres IP: " + ipAddress;
                            return;
                        }
                    }
                    document.getElementById("ip_address").textContent = "Adres IP nie znaleziony.";
                } else {
                    document.getElementById("ip_address").textContent = "Błąd podczas pobierania danych.";
                }
            };

            xhr.onerror = function () {
                document.getElementById("ip_address").textContent = "Błąd połączenia.";
            };

            xhr.send();
        }
    </script>
</body>
</html>
