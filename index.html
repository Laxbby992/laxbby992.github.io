<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Activation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            margin: 10px 0;
            padding: 10px;
            width: 300px;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Activate Your License</h1>
    <input type="text" id="email" placeholder="Enter your email" required>
    <input type="text" id="licenseKey" placeholder="Enter your license key" required>
    <button id="activateButton">Activate License</button>

    <p id="result"></p>

    <script>
        document.getElementById('activateButton').addEventListener('click', async function() {
            const email = document.getElementById('email').value;
            const licenseKey = document.getElementById('licenseKey').value;

            const apiUrl = "https://laxbby992-github-io.onrender.com/activate";

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        key: licenseKey
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('result').innerText = `License activated: ${data.order_id}`;
                } else {
                    document.getElementById('result').innerText = `Activation failed: ${data.error}`;
                }
            } catch (error) {
                document.getElementById('result').innerText = 'Error connecting to server.';
            }
        });
    </script>
</body>
</html>
